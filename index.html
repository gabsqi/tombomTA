<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque — CelularesPRO</title>

  <!-- Fonte Inter do Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Estilos em arquivo separado -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ==============================
       CABEÇALHO
       ============================== -->
  <header class="cabecalho">

    <div class="cabecalho__logo">
      <span class="cabecalho__icone">📱</span>
      <div>
        <!-- Troque pelo nome do seu negócio -->
        <h1 class="cabecalho__titulo">Celulares<span>PRO</span></h1>
        <p class="cabecalho__subtitulo">Estoque atualizado diariamente ✅</p>
      </div>
    </div>

    <!-- Botão WhatsApp no cabeçalho -->
    <a
      href="https://wa.me/5551999255568?text=Olá!%20Quero%20saber%20mais%20sobre%20os%20celulares%20disponíveis.%20😊"
      target="_blank"
      class="botao-wa"
    >
      <!-- Ícone SVG do WhatsApp — sem precisar de biblioteca externa -->
      <svg class="icone-wa" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Fale Conosco
    </a>

  </header>


  <!-- ==============================
       CONTEÚDO PRINCIPAL
       ============================== -->
  <main class="principal">

    <!-- Barra de ferramentas: busca + filtros + ordenação -->
    <div class="barra-ferramentas">

      <!-- Campo de busca -->
      <input
        type="search"
        id="campo-busca"
        class="campo-busca"
        placeholder="🔍 Buscar por modelo ou cor..."
        autocomplete="off"
      />

      <!-- Botões de filtro por MARCA (gerados pelo JavaScript) -->
      <div class="filtros-grupo" id="filtros-marca"></div>

      <!-- Botões de filtro por TIPO (gerados pelo JavaScript) -->
      <div class="filtros-grupo" id="filtros-tipo"></div>

      <!-- Ordenação -->
      <select id="select-ordenacao" class="select-ordenacao">
        <option value="nome">Ordenar: A → Z</option>
        <option value="menor-preco">Menor Preço</option>
        <option value="maior-preco">Maior Preço</option>
        <option value="mais-estoque">Mais Estoque</option>
      </select>

    </div>

    <!-- Mensagem de carregamento / contagem de resultados -->
    <p class="contador" id="contador">⏳ Carregando estoque...</p>

    <!-- Grade de produtos — os cards são criados pelo JavaScript -->
    <div class="grade-produtos" id="grade-produtos"></div>

    <!-- Aparece quando nenhum produto bate com os filtros -->
    <div class="sem-resultados oculto" id="sem-resultados">
      <p>😕 Nenhum produto encontrado com esses filtros.</p>
      <!-- onclick chama a função limparFiltros() do script.js -->
      <button onclick="limparFiltros()" class="botao-limpar">Limpar filtros</button>
    </div>

  </main>


  <!-- Botão flutuante do WhatsApp (sempre visível) -->
  <a
    href="https://wa.me/5551999255568?text=Olá!%20Vi%20o%20catálogo%20e%20gostaria%20de%20tirar%20uma%20dúvida.%20😊"
    target="_blank"
    class="whatsapp-flutuante"
  >
    <svg class="icone-wa" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    💬 WhatsApp
  </a>


  <!-- ==============================
       RODAPÉ
       ============================== -->
  <footer class="rodape">
    <p>© 2026 CelularesPRO — Estoque atualizado diariamente</p>
  </footer>


  <!-- Script em arquivo separado — SEMPRE no final do body! -->
  <script src="script.js"></script>

</body>
</html>
